<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a1628"/>
  <rect x="0" y="0" width="1200" height="8" fill="#f5c842"/>
  <rect x="0" y="622" width="1200" height="8" fill="#f5c842"/>

  <!-- Background pattern -->
  <rect x="800" y="0" width="400" height="630" fill="#111d35" opacity="0.5"/>

  <!-- Title -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">Tamil Nadu</text>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#f5c842">Elections Dashboard</text>

  <!-- Subtitle -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="24" fill="#9cb3d8">All 234 Assembly Constituencies · 1952 – 2021</text>

  <!-- Divider -->
  <rect x="80" y="270" width="600" height="3" fill="#f5c842" opacity="0.5"/>

  <!-- Features list -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="20" fill="#c5d5ef">✅  234 Constituency Results (2021)</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="20" fill="#c5d5ef">✅  State Election Trends from 1952</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="20" fill="#c5d5ef">✅  All Chief Ministers · Rajaji to Stalin</text>
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="20" fill="#c5d5ef">✅  Alliance Analysis · CM · Opposition Leader</text>
  <text x="80" y="480" font-family="Arial, sans-serif" font-size="20" fill="#c5d5ef">✅  Search &amp; Filter by District · Party · Alliance</text>

  <!-- Author -->
  <rect x="80" y="530" width="620" height="50" rx="8" fill="#1a2f5e"/>
  <text x="100" y="562" font-family="Arial, sans-serif" font-size="18" fill="#f5c842" font-weight="700">Prepared by Dr. Sundararaman Chintamani</text>

  <!-- Right side decoration -->
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="120" fill="#f5c842" opacity="0.15">TN</text>
  <text x="840" y="320" font-family="Arial, sans-serif" font-size="48" fill="#9cb3d8" opacity="0.4">234</text>
  <text x="820" y="375" font-family="Arial, sans-serif" font-size="22" fill="#9cb3d8" opacity="0.4">Constituencies</text>
  <text x="835" y="440" font-family="Arial, sans-serif" font-size="22" fill="#9cb3d8" opacity="0.4">16 Elections</text>
  <text x="845" y="495" font-family="Arial, sans-serif" font-size="22" fill="#9cb3d8" opacity="0.4">1952 – 2021</text>

  <!-- Election year bubbles -->
  <circle cx="900" cy="530" r="28" fill="#c94c2e" opacity="0.8"/>
  <text x="900" y="537" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">ADMK</text>
  <circle cx="970" cy="530" r="28" fill="#e88c10" opacity="0.8"/>
  <text x="970" y="537" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">DMK</text>
  <circle cx="1040" cy="530" r="28" fill="#2e8b57" opacity="0.8"/>
  <text x="1040" y="537" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">INC</text>
  <circle cx="1110" cy="530" r="28" fill="#1a5fa8" opacity="0.8"/>
  <text x="1110" y="537" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">BJP</text>
</svg>
